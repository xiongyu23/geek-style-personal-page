<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quantitative Research & Trading Terminal">
    <title>Quantitative Research Terminal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Top Status Bar -->
        <div class="top-bar">
            <div class="top-bar-left">
                <div class="status-item">
                    <span class="status-label">System</span>
                    <span class="status-value active">ONLINE</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Latency</span>
                    <span class="status-value">--</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Memory</span>
                    <span class="status-value">--</span>
                </div>
            </div>
            <div class="top-bar-right">
                <div class="status-item">
                    <span class="status-value" id="clock">00:00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Menu Bar (rendered by JS) -->
        <div class="menu-bar"></div>
        
        <!-- Workspace -->
        <div class="workspace">
            <div class="grid-bg"></div>
            
            <!-- Panels will be rendered dynamically -->
        </div>
    </div>
    
    <!-- Data Configuration -->
    <script src="data.js"></script>
    
    <!-- Main Application -->
    <script src="main.js"></script>
</body>
</html>
